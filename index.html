<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>あなたの北海道は何 %？</title>
    <!-- FOCT 防止: レンダリング前にテーマを確定する -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <!-- 初期スプラッシュ: JS/CSS バンドル読込前・coi リロードをまたいで連続表示する -->
    <style>
      #app-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem;
        background: #F8F4FF; color: #1C1230;
        font-family: system-ui, -apple-system, sans-serif;
      }
      html[data-theme="dark"] #app-splash { background: #161020; color: #F0EAFF; }
      #app-splash .spinner {
        width: 48px; height: 48px; border-radius: 50%;
        border: 4px solid rgba(168, 128, 200, .3); border-top-color: #A880C8;
        animation: app-spin .8s linear infinite;
      }
      html[data-theme="dark"] #app-splash .spinner { border-top-color: #B79AD8; }
      @keyframes app-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-splash" role="status" aria-live="polite">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>
    </div>
    <script src="%BASE_URL%coi-serviceworker.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
