<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>あなたの北海道は何 %？｜市区町村の割合を面積・人口で可視化</title>
    <meta
      name="description"
      content="北海道の市区町村を地図やチェックボックスで選ぶと，面積・人口・ふるさと納税が全道に占める割合をブラウザ内で集計し，その場で可視化する静的 Web アプリ．結果は X や URL で共有できる．"
    />

    <!-- favicon / アプリアイコン -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F8F4FF" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161020" />

    <!-- Open Graph (SNS 共有時のサムネイル) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="あなたの北海道は何 %？" />
    <meta
      property="og:description"
      content="北海道の市区町村を選ぶと，面積・人口・ふるさと納税が全道に占める割合をその場で集計して可視化．あなたの街は北海道の何 %？ 結果は X や URL で共有できる．"
    />
    <meta property="og:url" content="https://tomio2480.github.io/frontend-phpcon-do-2026/" />
    <meta property="og:image" content="https://tomio2480.github.io/frontend-phpcon-do-2026/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="北海道のシルエットを下から塗り上げて割合を表すロゴと，アプリ名「あなたの北海道は何 %？」" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:site_name" content="あなたの北海道は何 %？" />

    <!-- Twitter (X) Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="あなたの北海道は何 %？" />
    <meta
      name="twitter:description"
      content="北海道の市区町村を選ぶと，面積・人口・ふるさと納税が全道に占める割合をその場で集計して可視化．あなたの街は北海道の何 %？ 結果は X や URL で共有できる．"
    />
    <meta name="twitter:image" content="https://tomio2480.github.io/frontend-phpcon-do-2026/og-image.png" />
    <!-- FOCT 防止: レンダリング前にテーマを確定する -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <!-- 初期スプラッシュ: JS/CSS バンドル読込前・coi リロードをまたいで連続表示する -->
    <style>
      #app-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem;
        background: #F8F4FF; color: #1C1230;
        font-family: system-ui, -apple-system, sans-serif;
      }
      html[data-theme="dark"] #app-splash { background: #161020; color: #F0EAFF; }
      #app-splash .spinner {
        width: 48px; height: 48px; border-radius: 50%;
        border: 4px solid rgba(168, 128, 200, .3); border-top-color: #A880C8;
        animation: app-spin .8s linear infinite;
      }
      html[data-theme="dark"] #app-splash .spinner { border-top-color: #B79AD8; }
      @keyframes app-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-splash" role="status" aria-live="polite">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>
    </div>
    <script src="%BASE_URL%coi-serviceworker.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
