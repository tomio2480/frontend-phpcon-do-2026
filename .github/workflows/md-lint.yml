name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.3
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Markdown Lint via composite action
        uses: tomio2480/github-workflows/.github/actions/markdown-lint@d0f0be22a342656af9a8ae6fab65fe477d091cd3 # v2.5.10
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
