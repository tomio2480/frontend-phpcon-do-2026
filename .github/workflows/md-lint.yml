name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v6.0.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Markdown Lint via composite action
        uses: tomio2480/github-workflows/.github/actions/markdown-lint@d0f0be22a342656af9a8ae6fab65fe477d091cd3 # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
